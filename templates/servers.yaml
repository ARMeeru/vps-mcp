# VPS Manager Configuration Template
# Copy this file and customize for your servers

vps_manager:
  # Connection pool settings
  connection_pool:
    max_connections_per_server: 3
    connection_timeout: 30
    health_check_interval: 300
    reconnect_attempts: 3

  # Security settings
  security:
    allowed_directories:
      - "/home"
      - "/var/log"
      - "/etc"
      - "/tmp"
      - "/opt"
    enable_command_validation: true
    log_all_commands: true

  # Command queue settings (new in v0.2.0)
  queue:
    enable_queuing: true # Enable command queuing system
    max_concurrent_per_server: 3 # Max concurrent commands per server
    default_rate_limit: 5 # Commands per second (default)
    max_queue_size: 100 # Maximum queue depth
    result_retention_hours: 24 # How long to keep command results
    cleanup_interval_hours: 1 # How often to clean up old results

  # Logging configuration
  logging:
    level: "INFO"
    file: "/tmp/vps-manager.log"
    max_size: "10MB"
    backup_count: 5

# Server definitions
servers:
  # Example server configuration
  my-server:
    host: "your-server-ip-or-hostname"
    port: 22
    username: "your-username"
    # SSH key authentication (recommended)
    ssh_key_path: "~/.ssh/id_rsa"
    # OR password authentication (not recommended for production)
    # password: "your-password"

    # Optional: Custom connection settings
    connection_timeout: 30
    keepalive_interval: 60

    # Optional: Server-specific allowed directories
    allowed_directories:
      - "/home/myuser"
      - "/var/www"
      - "/opt/myapp"

    # Optional: Server-specific queue settings (new in v0.2.0)
    queue_settings:
      max_concurrent: 5 # Override default concurrent limit
      rate_limit: 10 # Override default rate limit
      priority_rate_limit: # Rate limits by priority
        critical: 20 # Critical commands: 20/sec
        high: 15 # High priority: 15/sec
        normal: 10 # Normal priority: 10/sec
        low: 5 # Low priority: 5/sec


